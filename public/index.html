<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 字幕翻译工具</title>
<style>
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #242836; --border: #2e3348;
    --text: #e4e6f0; --text2: #9499b3; --accent: #6c5ce7; --accent2: #a29bfe;
    --green: #00cec9; --red: #ff6b6b; --orange: #feca57; --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  a { color: var(--accent2); text-decoration: none; cursor: pointer; }
  a:hover { text-decoration: underline; }

  /* ===== Auth Pages ===== */
  .auth-wrapper {
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
    background: linear-gradient(135deg, #0f1117 0%, #1a1040 100%);
  }
  .auth-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .auth-card h1 {
    font-size: 1.6rem; text-align: center; margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent2), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .auth-card .subtitle { text-align: center; color: var(--text2); font-size: 0.9rem; margin-bottom: 30px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; color: var(--text2); }
  .form-row { display: flex; gap: 10px; }
  .form-row input { flex: 1; }
  .input {
    width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text); font-size: 0.95rem; outline: none; transition: border-color 0.2s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text2); opacity: 0.6; }
  .btn-sms {
    padding: 12px 18px; border: none; border-radius: 8px; background: var(--accent);
    color: #fff; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-sms:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-auth {
    width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff;
  }
  .btn-auth:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,92,231,0.4); }
  .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text2); }
  .form-error { color: var(--red); font-size: 0.85rem; margin-top: 6px; display: none; }
  .form-error.show { display: block; }

  /* ===== App Layout ===== */
  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  .app-header h1 {
    font-size: 1.4rem;
    background: linear-gradient(135deg, var(--accent2), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .user-bar { display: flex; align-items: center; gap: 16px; font-size: 0.9rem; }
  .user-bar .credits {
    background: var(--bg3); padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); font-size: 0.85rem;
  }
  .user-bar .credits strong { color: var(--orange); }
  .user-bar .credits .pts { color: var(--green); }
  .btn-logout {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }
  .btn-admin {
    padding: 6px 14px; border: 1px solid var(--accent); border-radius: 8px;
    background: rgba(108,92,231,0.1); color: var(--accent2); font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-admin:hover { background: rgba(108,92,231,0.2); }

  /* ===== Upload ===== */
  .upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 50px 30px; text-align: center; cursor: pointer;
    transition: all 0.3s; background: var(--bg2); margin-bottom: 24px;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(108,92,231,0.08); }
  .upload-zone.has-file { border-color: var(--green); border-style: solid; background: rgba(0,206,201,0.05); }
  .upload-icon { font-size: 3rem; margin-bottom: 12px; }
  .upload-zone h3 { font-size: 1.1rem; margin-bottom: 6px; }
  .upload-zone p { color: var(--text2); font-size: 0.9rem; }
  .file-info { display: none; margin-top: 16px; padding: 12px 20px; background: var(--bg3); border-radius: 8px; font-size: 0.9rem; }
  .file-info.show { display: flex; align-items: center; justify-content: space-between; }
  .file-info .name { color: var(--green); font-weight: 600; }
  .file-info .meta { color: var(--text2); }

  /* ===== Settings ===== */
  .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 640px) { .settings { grid-template-columns: 1fr; } }
  .setting-group { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .setting-group label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 0.95rem; }
  .setting-group label span { color: var(--text2); font-weight: 400; font-size: 0.85rem; }
  select {
    width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text); font-size: 0.95rem; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }

  /* ===== Buttons ===== */
  .actions { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .btn {
    padding: 14px 32px; border: none; border-radius: 8px; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; flex: 1; justify-content: center; }
  .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,92,231,0.4); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
  .btn-danger { background: rgba(255,107,107,0.15); color: var(--red); border: 1px solid rgba(255,107,107,0.3); }
  .btn-danger:hover:not(:disabled) { background: rgba(255,107,107,0.25); }
  .btn-sm { padding: 6px 14px; font-size: 0.82rem; border-radius: 6px; }

  /* ===== Progress ===== */
  .progress-area { display: none; margin-bottom: 24px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .progress-area.show { display: block; }
  .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
  .progress-bar { height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 4px; transition: width 0.3s; width: 0%; }
  .progress-log { max-height: 150px; overflow-y: auto; font-size: 0.82rem; color: var(--text2); font-family: 'Consolas','Monaco',monospace; }
  .progress-log div { padding: 2px 0; }
  .progress-log .error { color: var(--red); }
  .progress-log .success { color: var(--green); }

  /* ===== Preview ===== */
  .preview-area { display: none; margin-bottom: 24px; }
  .preview-area.show { display: block; }
  .preview-tabs { display: flex; gap: 0; margin-bottom: 0; }
  .preview-tab {
    padding: 12px 24px; background: var(--bg3); border: 1px solid var(--border);
    border-bottom: none; border-radius: 8px 8px 0 0; cursor: pointer;
    font-size: 0.9rem; color: var(--text2); transition: all 0.2s;
  }
  .preview-tab.active { background: var(--bg2); color: var(--text); font-weight: 600; border-color: var(--accent); border-bottom: 1px solid var(--bg2); margin-bottom: -1px; position: relative; z-index: 1; }
  .preview-content {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 0 8px 8px 8px;
    padding: 20px; max-height: 500px; overflow-y: auto;
    font-family: 'Consolas','Monaco',monospace; font-size: 0.88rem; line-height: 1.8;
    white-space: pre-wrap; word-break: break-word;
  }
  .preview-content .idx { color: var(--accent2); }
  .preview-content .time { color: var(--text2); }
  .preview-content .orig { color: var(--text); }
  .preview-content .trans { color: var(--green); }

  /* ===== Stats ===== */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--accent2); }
  .stat-card .label { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }

  /* ===== Admin ===== */
  .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .admin-header h2 { font-size: 1.3rem; }
  .admin-table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: var(--radius); overflow: hidden; }
  .admin-table th, .admin-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
  .admin-table th { background: var(--bg3); color: var(--text2); font-weight: 600; font-size: 0.82rem; text-transform: uppercase; }
  .admin-table tr:hover td { background: rgba(108,92,231,0.05); }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
  .badge-vip { background: rgba(254,202,87,0.15); color: var(--orange); }
  .badge-normal { background: rgba(148,153,179,0.15); color: var(--text2); }
  .badge-admin { background: rgba(108,92,231,0.15); color: var(--accent2); }
  .table-wrap { overflow-x: auto; }
  .admin-actions-cell { display: flex; gap: 6px; }

  /* ===== Modal ===== */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: 90%; max-width: 400px; }
  .modal h3 { margin-bottom: 20px; font-size: 1.1rem; }
  .modal .form-group { margin-bottom: 14px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; justify-content: center; padding: 10px; }

  /* ===== Toast ===== */
  .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast { padding: 14px 20px; border-radius: 8px; font-size: 0.9rem; animation: slideIn 0.3s ease; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
  .toast.error { background: var(--red); color: #fff; }
  .toast.success { background: var(--green); color: #000; }
  .toast.info { background: var(--accent); color: #fff; }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .hidden { display: none !important; }
  input[type="file"] { display: none; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- ==================== 登录页 ==================== -->
<div id="pageLogin" class="auth-wrapper">
  <div class="auth-card">
    <h1>🎬 AI 字幕翻译</h1>
    <p class="subtitle">手机号验证码登录</p>
    <div class="form-group">
      <label>手机号</label>
      <div class="form-row">
        <input class="input" id="loginPhone" type="tel" placeholder="请输入手机号" maxlength="11">
        <button class="btn-sms" id="loginSmsBtn" onclick="sendSms('login')">获取验证码</button>
      </div>
    </div>
    <div class="form-group">
      <label>验证码</label>
      <input class="input" id="loginCode" type="text" placeholder="请输入6位验证码" maxlength="6">
    </div>
    <div class="form-error" id="loginError"></div>
    <button class="btn-auth" onclick="doLogin()">登 录</button>
    <div style="text-align:center;margin-top:14px;">
      <button style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:0.9rem;text-decoration:underline;" onclick="enterAsGuest()">跳过登录，直接使用</button>
    </div>
    <div class="auth-switch">还没有账号？<a onclick="showPage('register')">立即注册</a></div>
  </div>
</div>

<!-- ==================== 注册页 ==================== -->
<div id="pageRegister" class="auth-wrapper hidden">
  <div class="auth-card">
    <h1>🎬 AI 字幕翻译</h1>
    <p class="subtitle">手机号注册新账号</p>
    <div class="form-group">
      <label>用户名</label>
      <input class="input" id="regUsername" type="text" placeholder="请输入用户名（至少2个字符）">
    </div>
    <div class="form-group">
      <label>手机号</label>
      <div class="form-row">
        <input class="input" id="regPhone" type="tel" placeholder="请输入手机号" maxlength="11">
        <button class="btn-sms" id="regSmsBtn" onclick="sendSms('register')">获取验证码</button>
      </div>
    </div>
    <div class="form-group">
      <label>验证码</label>
      <input class="input" id="regCode" type="text" placeholder="请输入6位验证码" maxlength="6">
    </div>
    <div class="form-error" id="regError"></div>
    <button class="btn-auth" onclick="doRegister()">注 册</button>
    <div class="auth-switch">已有账号？<a onclick="showPage('login')">去登录</a></div>
  </div>
</div>

<!-- ==================== 翻译主页 ==================== -->
<div id="pageApp" class="hidden">
  <div class="container">
    <div class="app-header">
      <h1>🎬 AI 字幕翻译</h1>
      <div class="user-bar">
        <div class="credits" id="creditsBox">
          💎 <strong id="dispCredits">0</strong> 字符点数 &nbsp; ⭐ <span class="pts" id="dispPoints">0</span> 积分
        </div>
        <span id="dispUsername" style="color:var(--text2)"></span>
        <button id="btnLoginHeader" class="btn-admin" onclick="showPage('login')" style="display:none;">🔑 登录</button>
        <button class="btn-admin hidden" id="btnAdmin" onclick="showPage('admin')">⚙ 管理后台</button>
        <button class="btn-logout" id="btnLogout" onclick="doLogout()">退出</button>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📄</div>
      <h3>拖拽 SRT 文件到此处，或点击选择文件</h3>
      <p>支持 .srt 格式字幕文件</p>
      <div class="file-info" id="fileInfo">
        <div><span class="name" id="fileName"></span><span class="meta" id="fileMeta"></span></div>
        <button class="btn btn-danger btn-sm" onclick="clearFile()">移除</button>
      </div>
      <input type="file" id="fileInput" accept=".srt">
    </div>

    <div class="stats hidden" id="statsArea">
      <div class="stat-card"><div class="value" id="statBlocks">0</div><div class="label">字幕条数</div></div>
      <div class="stat-card"><div class="value" id="statLines">0</div><div class="label">总行数</div></div>
      <div class="stat-card"><div class="value" id="statChars">0</div><div class="label">总字符数</div></div>
      <div class="stat-card"><div class="value" id="statCost">0</div><div class="label">预计消耗点数</div></div>
    </div>

    <div class="settings">
      <div class="setting-group">
        <label>🤖 AI 模型</label>
        <select id="modelSelect">
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="deepseek-v4-flash">DeepSeek V4 Flash</option>
        </select>
      </div>
      <div class="setting-group">
        <label>🌐 目标语言</label>
        <select id="langSelect">
          <option value="en" selected>English 英语</option>
          <option value="zh-CN">简体中文</option>
          <option value="zh-TW">繁體中文</option>
          <option value="ja">日本語 日语</option>
          <option value="ko">한국어 韩语</option>
          <option value="ru">Русский 俄语</option>
          <option value="de">Deutsch 德语</option>
          <option value="fr">Français 法语</option>
          <option value="vi">Tiếng Việt 越南语</option>
          <option value="th">ไทย 泰语</option>
          <option value="id">Bahasa Indonesia 印尼语</option>
          <option value="ms">Bahasa Melayu 马来语</option>
          <option value="my">မြန်မာဘာသာ 缅甸语</option>
          <option value="fil">Filipino 菲律宾语</option>
          <option value="pt">Português 葡萄牙语</option>
          <option value="es">Español 西班牙语</option>
          <option value="it">Italiano 意大利语</option>
          <option value="ar">العربية 阿拉伯语</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="translateBtn" disabled onclick="startTranslation()">
        <span id="translateBtnText">🚀 开始翻译</span>
      </button>
      <button class="btn btn-secondary" id="downloadBtn" disabled onclick="downloadSRT()">💾 下载翻译结果</button>
      <button class="btn btn-danger" id="cancelBtn" style="display:none;" onclick="cancelTranslation()">⏹ 取消</button>
    </div>

    <div class="progress-area" id="progressArea">
      <div class="progress-header"><span id="progressText">准备中...</span><span id="progressPercent">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-log" id="progressLog"></div>
    </div>

    <div class="preview-area" id="previewArea">
      <div class="preview-tabs">
        <div class="preview-tab active" onclick="switchPreview(this,'original')">原文</div>
        <div class="preview-tab" onclick="switchPreview(this,'translated')">译文</div>
        <div class="preview-tab" onclick="switchPreview(this,'sidebyside')">双语对照</div>
      </div>
      <div class="preview-content" id="previewContent"></div>
    </div>
  </div>
</div>

<!-- ==================== 管理后台 ==================== -->
<div id="pageAdmin" class="hidden">
  <div class="container">
    <div class="app-header">
      <h1>⚙ 管理后台</h1>
      <div class="user-bar">
        <button class="btn-admin" onclick="showPage('app')">← 返回翻译</button>
        <button class="btn-logout" onclick="doLogout()">退出</button>
      </div>
    </div>
    <div class="admin-header">
      <h2>用户管理</h2>
      <button class="btn btn-secondary btn-sm" onclick="loadUsers()">🔄 刷新</button>
    </div>
    <div class="table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>用户码</th><th>用户名</th><th>手机号</th><th>等级</th>
            <th>字符点数</th><th>积分</th><th>注册时间</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ==================== 编辑用户弹窗 ==================== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>编辑用户</h3>
    <input type="hidden" id="editUserId">
    <div class="form-group"><label>用户名</label><input class="input" id="editUsername"></div>
    <div class="form-group"><label>等级</label>
      <select class="input" id="editLevel"><option value="normal">普通用户</option><option value="vip">VIP会员</option></select>
    </div>
    <div class="form-group"><label>字符点数</label><input class="input" id="editCredits" type="number"></div>
    <div class="form-group"><label>积分</label><input class="input" id="editPoints" type="number"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEditUser()">保存</button>
    </div>
  </div>
</div>

<script>
const LANG_NAMES = {
  'en':'English','zh-CN':'简体中文','zh-TW':'繁體中文','ja':'日本語','ko':'한국어','ru':'Русский',
  'de':'Deutsch','fr':'Français','vi':'Tiếng Việt','th':'ไทย','id':'Bahasa Indonesia',
  'ms':'Bahasa Melayu','my':'မြန်မာဘာသာ','fil':'Filipino','pt':'Português',
  'es':'Español','it':'Italiano','ar':'العربية'
};

let token = localStorage.getItem('token');
let currentUser = null;
let parsedBlocks = [], translatedBlocks = [];
let isTranslating = false, abortController = null;

// ============ 页面切换 ============
function showPage(page) {
  document.getElementById('pageLogin').classList.toggle('hidden', page !== 'login');
  document.getElementById('pageRegister').classList.toggle('hidden', page !== 'register');
  document.getElementById('pageApp').classList.toggle('hidden', page !== 'app');
  document.getElementById('pageAdmin').classList.toggle('hidden', page !== 'admin');
  if (page === 'admin') loadUsers();
}

// ============ API 请求 ============
async function api(url, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(url, { ...options, headers });
  const data = await res.json();
  if (data.error && typeof data.error === 'string') {
    if (res.status === 401 && token) {
      // 只有已登录用户才跳转登录页
      token = null; localStorage.removeItem('token'); showPage('login');
      showToast('登录已过期，请重新登录', 'info');
    }
  }
  return { status: res.status, data };
}

// ============ 验证码倒计时 ============
function startSmsCountdown(btnId) {
  const btn = document.getElementById(btnId);
  let sec = 60;
  btn.disabled = true;
  btn.textContent = `${sec}s`;
  const t = setInterval(() => {
    sec--;
    btn.textContent = `${sec}s`;
    if (sec <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = '获取验证码'; }
  }, 1000);
}

// ============ 发送验证码 ============
async function sendSms(type) {
  const phone = document.getElementById(type === 'login' ? 'loginPhone' : 'regPhone').value.trim();
  if (!/^1\d{10}$/.test(phone)) { showToast('请输入正确的11位手机号', 'error'); return; }
  const endpoint = '/api/sms/send';
  const { data } = await api(endpoint, { method: 'POST', body: JSON.stringify({ phone, isLogin: type === 'login' }) });
  if (data.error) { showToast(data.error, 'error'); return; }
  showToast('验证码已发送（查看服务器控制台）', 'success');
  startSmsCountdown(type === 'login' ? 'loginSmsBtn' : 'regSmsBtn');
}

// ============ 注册 ============
async function doRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const code = document.getElementById('regCode').value.trim();
  const errEl = document.getElementById('regError');
  errEl.classList.remove('show');

  if (username.length < 2) { errEl.textContent = '用户名至少2个字符'; errEl.classList.add('show'); return; }
  if (!/^1\d{10}$/.test(phone)) { errEl.textContent = '请输入正确的手机号'; errEl.classList.add('show'); return; }
  if (!code) { errEl.textContent = '请输入验证码'; errEl.classList.add('show'); return; }

  const { data } = await api('/api/register', { method: 'POST', body: JSON.stringify({ phone, code, username }) });
  if (data.error) { errEl.textContent = data.error; errEl.classList.add('show'); return; }

  token = data.token;
  localStorage.setItem('token', token);
  currentUser = data.user;
  enterApp();
  showToast('注册成功！', 'success');
}

// ============ 登录 ============
async function doLogin() {
  const phone = document.getElementById('loginPhone').value.trim();
  const code = document.getElementById('loginCode').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.classList.remove('show');

  if (!/^1\d{10}$/.test(phone)) { errEl.textContent = '请输入正确的手机号'; errEl.classList.add('show'); return; }
  if (!code) { errEl.textContent = '请输入验证码'; errEl.classList.add('show'); return; }

  const { data } = await api('/api/login', { method: 'POST', body: JSON.stringify({ phone, code }) });
  if (data.error) { errEl.textContent = data.error; errEl.classList.add('show'); return; }

  token = data.token;
  localStorage.setItem('token', token);
  currentUser = data.user;
  enterApp();
  showToast('登录成功！', 'success');
}

// ============ 退出 ============
function doLogout() {
  token = null; currentUser = null;
  localStorage.removeItem('token');
  showPage('login');
}

// ============ 进入应用 ============
function enterApp() {
  if (currentUser) {
    document.getElementById('dispUsername').textContent = currentUser.username;
    document.getElementById('dispCredits').textContent = currentUser.charCredits.toLocaleString();
    document.getElementById('dispPoints').textContent = currentUser.points.toLocaleString();
    document.getElementById('creditsBox').style.display = '';
    document.getElementById('btnLogout').style.display = '';
    document.getElementById('btnLoginHeader').style.display = 'none';
    if (currentUser.role === 'admin') document.getElementById('btnAdmin').classList.remove('hidden');
    else document.getElementById('btnAdmin').classList.add('hidden');
  } else {
    document.getElementById('dispUsername').textContent = '游客模式';
    document.getElementById('creditsBox').style.display = 'none';
    document.getElementById('btnLogout').style.display = 'none';
    document.getElementById('btnLoginHeader').style.display = '';
    document.getElementById('btnAdmin').classList.add('hidden');
  }
  showPage('app');
}

// ============ 游客模式 ============
function enterAsGuest() {
  token = null; currentUser = null;
  localStorage.removeItem('token');
  enterApp();
}

// ============ 刷新用户信息 ============
async function refreshUser() {
  const { data } = await api('/api/user/me');
  if (data.error) return;
  currentUser = data;
  document.getElementById('dispCredits').textContent = data.charCredits.toLocaleString();
  document.getElementById('dispPoints').textContent = data.points.toLocaleString();
}

// ============ SRT 解析 ============
function parseSRT(text) {
  const blocks = [];
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
  for (const part of text.split(/\n\n+/)) {
    const lines = part.split('\n').filter(l => l.trim());
    if (lines.length < 2) continue;
    let index = -1, timeLine = '', textLines = [];
    for (const line of lines) {
      if (/^\d+$/.test(line.trim()) && index === -1) index = parseInt(line.trim());
      else if (line.includes('-->')) timeLine = line.trim();
      else textLines.push(line.trim());
    }
    if (index > 0 && timeLine && textLines.length > 0) blocks.push({ index, time: timeLine, text: textLines.join('\n') });
  }
  return blocks;
}

function generateSRT(blocks) {
  return blocks.map(b => `${b.index}\n${b.time}\n${b.text}`).join('\n\n') + '\n';
}

// ============ 文件上传 ============
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.srt')) { showToast('请上传 .srt 格式字幕文件', 'error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    parsedBlocks = parseSRT(e.target.result);
    if (!parsedBlocks.length) { showToast('无法解析该 SRT 文件', 'error'); return; }
    translatedBlocks = [];
    document.getElementById('fileName').textContent = file.name;
    const totalChars = parsedBlocks.reduce((s, b) => s + b.text.length, 0);
    const totalLines = parsedBlocks.reduce((s, b) => s + b.text.split('\n').length, 0);
    document.getElementById('fileMeta').textContent = ` · ${parsedBlocks.length} 条 · ${(file.size/1024).toFixed(1)} KB`;
    document.getElementById('fileInfo').classList.add('show');
    uploadZone.classList.add('has-file');
    document.getElementById('translateBtn').disabled = false;
    document.getElementById('downloadBtn').disabled = true;
    document.getElementById('statBlocks').textContent = parsedBlocks.length;
    document.getElementById('statLines').textContent = totalLines;
    document.getElementById('statChars').textContent = totalChars;
    document.getElementById('statCost').textContent = totalChars.toLocaleString();
    document.getElementById('statsArea').classList.remove('hidden');
    showPreview('original');
    showToast(`已加载 ${parsedBlocks.length} 条字幕`, 'success');
  };
  reader.readAsText(file, 'UTF-8');
}

function clearFile() {
  parsedBlocks = []; translatedBlocks = [];
  document.getElementById('fileInfo').classList.remove('show');
  uploadZone.classList.remove('has-file');
  document.getElementById('translateBtn').disabled = true;
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('statsArea').classList.add('hidden');
  document.getElementById('previewArea').classList.remove('show');
  document.getElementById('progressArea').classList.remove('show');
  fileInput.value = '';
}

// ============ 翻译 ============
async function callTranslateAPI(model, prompt, charCount) {
  const { data } = await api('/api/translate', {
    method: 'POST',
    body: JSON.stringify({ model, messages: [{ role: 'user', content: prompt }], temperature: 0.3, max_tokens: 4096, charCount }),
  });
  if (data.error) throw new Error(typeof data.error === 'string' ? data.error : data.message || '翻译失败');
  if (data.charCredits !== undefined && data.charCredits !== null && currentUser) {
    currentUser.charCredits = data.charCredits;
    currentUser.points = data.points;
    document.getElementById('dispCredits').textContent = data.charCredits.toLocaleString();
    document.getElementById('dispPoints').textContent = data.points.toLocaleString();
  }
  return data.data.choices[0].message.content;
}

async function startTranslation() {
  if (!parsedBlocks.length || isTranslating) return;
  const totalChars = parsedBlocks.reduce((s, b) => s + b.text.length, 0);
  if (currentUser && currentUser.role !== 'admin' && currentUser.charCredits < totalChars) {
    showToast(`字符点数不足！需要 ${totalChars} 点，当前仅 ${currentUser.charCredits} 点`, 'error'); return;
  }

  isTranslating = true;
  abortController = new AbortController();
  translatedBlocks = new Array(parsedBlocks.length).fill(null);

  const model = document.getElementById('modelSelect').value;
  const targetLang = document.getElementById('langSelect').value;
  const langName = LANG_NAMES[targetLang];

  document.getElementById('translateBtn').disabled = true;
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('cancelBtn').style.display = '';
  document.getElementById('progressArea').classList.add('show');
  document.getElementById('progressLog').innerHTML = '';
  updateProgress(0, `开始翻译 · 模型: ${model} · 目标: ${langName} · 消耗: ${totalChars} 点`);

  const BATCH_SIZE = 30;
  const totalBatches = Math.ceil(parsedBlocks.length / BATCH_SIZE);

  try {
    for (let i = 0; i < totalBatches; i++) {
      if (abortController.signal.aborted) throw new Error('cancelled');
      const start = i * BATCH_SIZE, end = Math.min(start + BATCH_SIZE, parsedBlocks.length);
      const batch = parsedBlocks.slice(start, end);
      const batchText = batch.map(b => `[${b.index}] ${b.text}`).join('\n');
      const batchChars = batch.reduce((s, b) => s + b.text.length, 0);

      const prompt = `You are a professional subtitle translator. Translate the following subtitle text to ${langName} (${targetLang}).
Rules:
- Keep the translation natural and fluent, suitable for subtitles
- Preserve the original meaning and tone
- Do NOT add any explanations, notes, or extra content
- Keep each subtitle entry on its own line, maintaining the [index] prefix
- For each [N] entry, translate ONLY the text after the index
- Return ALL entries, do not skip any

Subtitles to translate:
${batchText}`;

      updateProgress(Math.round((i / totalBatches) * 100), `翻译第 ${start+1}-${end} 条（批次 ${i+1}/${totalBatches}）...`);
      const translated = await callTranslateAPI(model, prompt, batchChars);
      parseBatchResult(translated);
      updateProgress(Math.round(((i+1) / totalBatches) * 100), `已完成批次 ${i+1}/${totalBatches}`);
    }

    const missing = translatedBlocks.filter(b => b === null).length;
    if (missing > 0) { addLog(`⚠ ${missing} 条缺失，重试中...`, 'error'); await retryMissing(model, targetLang, langName); }

    updateProgress(100, '✅ 翻译完成！');
    addLog('翻译完成！', 'success');
    document.getElementById('downloadBtn').disabled = false;
    showPreview('translated');
    showToast('翻译完成！', 'success');
  } catch (err) {
    if (err.message === 'cancelled') { addLog('已取消', 'error'); showToast('翻译已取消', 'info'); }
    else { addLog(`错误: ${err.message}`, 'error'); showToast(`翻译失败: ${err.message}`, 'error'); }
  } finally {
    isTranslating = false;
    document.getElementById('translateBtn').disabled = false;
    document.getElementById('cancelBtn').style.display = 'none';
    abortController = null;
  }
}

function parseBatchResult(text) {
  for (const line of text.split('\n').filter(l => l.trim())) {
    const m = line.match(/\[(\d+)\]\s*([\s\S]*)/);
    if (m) {
      const idx = parseInt(m[1]), transText = m[2].trim();
      const blockIdx = parsedBlocks.findIndex(b => b.index === idx);
      if (blockIdx !== -1 && transText) translatedBlocks[blockIdx] = { ...parsedBlocks[blockIdx], text: transText };
    }
  }
}

async function retryMissing(model, targetLang, langName) {
  const missing = []; translatedBlocks.forEach((b, i) => { if (b === null) missing.push(i); });
  for (let i = 0; i < missing.length; i += 10) {
    if (abortController.signal.aborted) return;
    const batch = missing.slice(i, i + 10);
    const batchText = batch.map(idx => `[${parsedBlocks[idx].index}] ${parsedBlocks[idx].text}`).join('\n');
    const batchChars = batch.reduce((s, idx) => s + parsedBlocks[idx].text.length, 0);
    try {
      const result = await callTranslateAPI(model, `Translate to ${langName} (${targetLang}). Keep [index] prefix:\n${batchText}`, batchChars);
      for (const line of result.split('\n').filter(l => l.trim())) {
        const m = line.match(/\[(\d+)\]\s*([\s\S]*)/);
        if (m) { const idx = parseInt(m[1]); const bi = parsedBlocks.findIndex(b => b.index === idx); if (bi !== -1 && m[2].trim()) translatedBlocks[bi] = { ...parsedBlocks[bi], text: m[2].trim() }; }
      }
    } catch (e) { addLog(`重试失败: ${e.message}`, 'error'); }
  }
}

function cancelTranslation() { if (abortController) abortController.abort(); }

// ============ 进度 ============
function updateProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('progressText').textContent = text;
}
function addLog(text, type = '') {
  const log = document.getElementById('progressLog');
  const div = document.createElement('div'); if (type) div.className = type;
  div.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
}

// ============ 预览 ============
function showPreview(mode) { document.getElementById('previewArea').classList.add('show'); renderPreview(mode); }
function switchPreview(el, mode) {
  document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); renderPreview(mode);
}
function renderPreview(mode) {
  const c = document.getElementById('previewContent');
  if (mode === 'original') {
    c.innerHTML = parsedBlocks.map(b => `<div><span class="idx">${b.index}</span>\n<span class="time">${b.time}</span>\n<span class="orig">${esc(b.text)}</span></div>`).join('\n\n');
  } else if (mode === 'translated') {
    const v = translatedBlocks.filter(Boolean);
    if (!v.length) { c.innerHTML = '<span style="color:var(--text2)">暂无翻译结果</span>'; return; }
    c.innerHTML = v.map(b => `<div><span class="idx">${b.index}</span>\n<span class="time">${b.time}</span>\n<span class="trans">${esc(b.text)}</span></div>`).join('\n\n');
  } else {
    let h = '';
    for (let i = 0; i < parsedBlocks.length; i++) {
      h += `<div><span class="idx">${parsedBlocks[i].index}</span>\n<span class="time">${parsedBlocks[i].time}</span>\n<span class="orig">${esc(parsedBlocks[i].text)}</span>`;
      h += translatedBlocks[i] ? `\n<span class="trans">${esc(translatedBlocks[i].text)}</span>` : '\n<span style="color:var(--text2)">[未翻译]</span>';
      h += '</div>\n\n';
    }
    c.innerHTML = h;
  }
}
function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// ============ 下载 ============
function downloadSRT() {
  const v = translatedBlocks.filter(Boolean);
  if (!v.length) { showToast('没有可下载的结果', 'error'); return; }
  const blob = new Blob([generateSRT(v)], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `translated_${document.getElementById('langSelect').value}.srt`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast('文件已开始下载', 'success');
}

// ============ 管理后台 ============
async function loadUsers() {
  const { data } = await api('/api/admin/users');
  if (data.error) { showToast(data.error, 'error'); return; }
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = data.users.map(u => `
    <tr>
      <td><code>${u.userCode}</code></td>
      <td>${esc(u.username)}</td>
      <td>${u.phone}</td>
      <td><span class="badge badge-${u.level}">${u.level === 'vip' ? 'VIP' : u.level === 'admin' ? '管理员' : '普通'}</span></td>
      <td>${u.charCredits.toLocaleString()}</td>
      <td>${u.points.toLocaleString()}</td>
      <td>${new Date(u.createdAt).toLocaleDateString()}</td>
      <td class="admin-actions-cell">
        ${u.role !== 'admin' ? `
          <button class="btn btn-secondary btn-sm" onclick="openEditModal('${u.id}','${esc(u.username)}','${u.level}',${u.charCredits},${u.points})">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${esc(u.username)}')">删除</button>
        ` : '<span style="color:var(--text2)">—</span>'}
      </td>
    </tr>
  `).join('');
}

function openEditModal(id, username, level, credits, points) {
  document.getElementById('editUserId').value = id;
  document.getElementById('editUsername').value = username;
  document.getElementById('editLevel').value = level;
  document.getElementById('editCredits').value = credits;
  document.getElementById('editPoints').value = points;
  document.getElementById('editModal').classList.add('show');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('show'); }

async function saveEditUser() {
  const { data } = await api('/api/admin/user/update', {
    method: 'POST',
    body: JSON.stringify({
      userId: document.getElementById('editUserId').value,
      username: document.getElementById('editUsername').value,
      level: document.getElementById('editLevel').value,
      charCredits: parseInt(document.getElementById('editCredits').value),
      points: parseInt(document.getElementById('editPoints').value),
    }),
  });
  if (data.error) { showToast(data.error, 'error'); return; }
  closeEditModal(); loadUsers(); showToast('修改成功', 'success');
}

async function deleteUser(id, name) {
  if (!confirm(`确定删除用户「${name}」？此操作不可撤销。`)) return;
  const { data } = await api('/api/admin/user/delete', { method: 'POST', body: JSON.stringify({ userId: id }) });
  if (data.error) { showToast(data.error, 'error'); return; }
  loadUsers(); showToast('已删除', 'success');
}

// ============ Toast ============
function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; }, 3000);
  setTimeout(() => t.remove(), 3500);
}

// ============ 初始化 ============
(async function init() {
  if (token) {
    const { data } = await api('/api/user/me');
    if (!data.error) { currentUser = data; enterApp(); return; }
    token = null; localStorage.removeItem('token');
  }
  // 默认显示登录页，用户可以点"跳过"
  showPage('login');
})();
</script>
